<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | SuperMart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom styles for the standalone auth page */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f7f6;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" style="text-align: center; margin-bottom: 20px; font-size: 1.6rem;">
                <a href="index.html" style="text-decoration: none; color: inherit;">Super<span>Mart</span> 🛒</a>
            </div>

            <div class="auth-tabs">
                <button id="tabLogin" class="active" onclick="switchAuth('login')">Login</button>
                <button id="tabSignup" onclick="switchAuth('signup')">Sign Up</button>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="cta-btn">Sign In</button>
            </form>

            <form id="signupForm" class="auth-form hidden" onsubmit="handleSignup(event)">
                <input type="text" id="signupName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPass" placeholder="Create Password" required>
                <button type="submit" class="cta-btn">Create Account</button>
            </form>
        </div>
    </div>

    <footer style="margin-top: 40px;">
        <div class="footer-content">
            <div class="footer-section">
                <h3>About SuperMart</h3>
                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="#">Careers</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Help</h3>
                <ul>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="#">Shipping Info</a></li>
                    <li><a href="#">Returns</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Legal</h3>
                <ul>
                    <li><a href="#">Privacy Policy</a></li>
                    <li><a href="#">Terms & Conditions</a></li>
                    <li><a href="#">Cookies</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 SuperMart. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
