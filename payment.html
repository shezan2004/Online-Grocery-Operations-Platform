<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — FreshMart</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <a href="/" class="header-logo">🛒 FreshMart</a>
  <nav class="header-nav">
    <a href="/">← Back to Shop</a>
  </nav>
  <div id="auth-area"></div>
</header>

<!-- ── PAGE HEADER ───────────────────────────────────────────────────────── -->
<div class="page-header">
  <h1>💳 Checkout</h1>
  <p>Complete your order securely</p>
</div>

<!-- ── PAYMENT SECTION ───────────────────────────────────────────────────── -->
<div id="payment-section">
  <div class="payment-layout">

    <!-- Left: Payment Form -->
    <div class="payment-card">
      <h2>Payment Method</h2>

      <!-- Method tabs -->
      <div class="method-tabs">
        <button class="method-tab active" data-method="card">💳 Card</button>
        <button class="method-tab" data-method="wallet">📱 Wallet</button>
        <button class="method-tab" data-method="bank">🏦 Bank Transfer</button>
        <button class="method-tab" data-method="cod">💵 Cash on Delivery</button>
      </div>

      <!-- Card Form -->
      <div class="method-form active" id="form-card">
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric" />
          <span class="field-error" id="card-num-err"></span>
        </div>
        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="card-name" placeholder="As it appears on card" />
          <span class="field-error" id="card-name-err"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" />
            <span class="field-error" id="card-exp-err"></span>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="text" id="card-cvv" placeholder="3-4 digits" maxlength="4" inputmode="numeric" />
            <span class="field-error" id="card-cvv-err"></span>
          </div>
        </div>
        <p style="font-size:.78rem;color:var(--text-muted);margin-top:.5rem">🔒 Your card details are encrypted and secure.</p>
      </div>

      <!-- Wallet Form -->
      <div class="method-form" id="form-wallet">
        <div class="form-group">
          <label>Wallet Provider</label>
          <select id="wallet-provider">
            <option value="">Select a provider</option>
            <option value="PayPal">PayPal</option>
            <option value="Apple Pay">Apple Pay</option>
            <option value="Google Pay">Google Pay</option>
          </select>
          <span class="field-error" id="wallet-provider-err"></span>
        </div>
        <div class="form-group">
          <label>Wallet Email Address</label>
          <input type="email" id="wallet-email" placeholder="your@wallet.com" />
          <span class="field-error" id="wallet-email-err"></span>
        </div>
      </div>

      <!-- Bank Transfer Form -->
      <div class="method-form" id="form-bank">
        <div class="form-group">
          <label>Bank Name</label>
          <input type="text" id="bank-name" placeholder="e.g. Chase, Wells Fargo" />
          <span class="field-error" id="bank-name-err"></span>
        </div>
        <div class="form-group">
          <label>Account Number</label>
          <input type="text" id="bank-account" placeholder="8-17 digits" inputmode="numeric" />
          <span class="field-error" id="bank-acct-err"></span>
        </div>
        <div class="form-group">
          <label>Routing Number</label>
          <input type="text" id="bank-routing" placeholder="9 digits" inputmode="numeric" maxlength="9" />
          <span class="field-error" id="bank-routing-err"></span>
        </div>
        <div class="form-group">
          <label>Transfer Reference</label>
          <input type="text" id="transfer-ref" readonly style="background:var(--bg);cursor:default" />
        </div>
      </div>

      <!-- COD Form -->
      <div class="method-form" id="form-cod">
        <div class="form-group">
          <label>Delivery Address</label>
          <textarea id="cod-address" placeholder="Full delivery address including apartment/unit number" rows="3"></textarea>
          <span class="field-error" id="cod-addr-err"></span>
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input type="tel" id="cod-contact" placeholder="10-digit phone number" inputmode="numeric" />
          <span class="field-error" id="cod-contact-err"></span>
        </div>
        <div class="form-group">
          <label>Delivery Notes <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <textarea id="cod-notes" placeholder="Any special delivery instructions…" rows="2"></textarea>
        </div>
      </div>

      <button class="btn-place-order" onclick="finalizePayment()">🔒 Place Order</button>
    </div>

    <!-- Right: Order Summary -->
    <div class="summary-card">
      <h2>Order Summary</h2>
      <div id="summary-items"></div>
      <div id="summary-pricing"></div>
    </div>
  </div>
</div>

<!-- ── RECEIPT SECTION ───────────────────────────────────────────────────── -->
<div id="receipt-section"></div>

<!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="footer-bottom" style="max-width:100%;text-align:center;justify-content:center;">
    <span>© 2025 FreshMart. All rights reserved. | <a href="/" style="color:var(--accent)">Back to Shop</a></span>
  </div>
</footer>

<!-- ── SCRIPTS ───────────────────────────────────────────────────────────── -->
<script src="/firebase-config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/payment.js"></script>
<script>
  // Update header auth area
  document.addEventListener('DOMContentLoaded', () => {
    const session = getSession();
    const authArea = document.getElementById('auth-area');
    if (authArea && session) {
      authArea.innerHTML = `<span style="color:rgba(255,255,255,.9);font-size:.9rem">👤 ${session.name}</span>`;
    }
  });
</script>
</body>
</html>
