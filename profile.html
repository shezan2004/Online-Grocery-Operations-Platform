<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — FreshMart</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <a href="/" class="header-logo">🛒 FreshMart</a>
  <nav class="header-nav">
    <a href="/">← Back to Shop</a>
    <a href="/faq.html">FAQ</a>
    <a href="/contact.html">Contact</a>
  </nav>
  <div id="auth-area"></div>
</header>

<!-- ── PAGE HEADER ───────────────────────────────────────────────────────── -->
<div class="page-header">
  <h1>👤 My Profile</h1>
  <p>Manage your account, orders, and preferences</p>
</div>

<!-- ── PROFILE LAYOUT ────────────────────────────────────────────────────── -->
<div class="profile-layout">
  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn" data-tab="account" onclick="switchTab('account')">👤 Account Info</button>
    <button class="tab-btn" data-tab="orders"  onclick="switchTab('orders')">📦 Order History</button>
    <button class="tab-btn" data-tab="wishlist" onclick="switchTab('wishlist')">❤️ Wishlist</button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
  </nav>

  <!-- Account Info Tab -->
  <div class="tab-content" id="tab-account"></div>

  <!-- Order History Tab -->
  <div class="tab-content" id="tab-orders"></div>

  <!-- Wishlist Tab -->
  <div class="tab-content" id="tab-wishlist"></div>

  <!-- Settings Tab -->
  <div class="tab-content" id="tab-settings"></div>
</div>

<!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="footer-bottom" style="max-width:100%;justify-content:center;">
    <span>© 2025 FreshMart. All rights reserved. | <a href="/" style="color:var(--accent)">Back to Shop</a></span>
  </div>
</footer>

<!-- ── SCRIPTS ───────────────────────────────────────────────────────────── -->
<script src="/firebase-config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/profile.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const session = getSession();
    const authArea = document.getElementById('auth-area');
    if (authArea && session) {
      authArea.innerHTML = `
        <div class="user-menu">
          <span class="user-avatar">${session.name.charAt(0).toUpperCase()}</span>
          <span class="user-name">${session.name.split(' ')[0]}</span>
          <div class="user-dropdown">
            <button onclick="signOut()" class="logout-btn">🚪 Sign Out</button>
          </div>
        </div>`;
    }
  });
</script>
</body>
</html>
